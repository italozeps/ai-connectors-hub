<!DOCTYPE html>
<html lang="lv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alise — Seno Valodu Lasītāja</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main>
    <header>
      <h1>Alise</h1>
      <p class="subtitle">Seno valodu lasījumu aģents<br>
        <span class="langs">Sengrieķu · Senebreju · Latviešu</span>
      </p>
    </header>

    <div class="mode-tabs">
      <button class="tab-btn active" data-mode="a">A — Lasīt failu</button>
      <button class="tab-btn" data-mode="b">B — Mikrofons</button>
    </div>

    <section class="card" id="modeA">
      <label class="file-label" id="fileLabel">
        <input type="file" id="fileInput" accept=".txt,.pdf" />
        <span id="fileName">Izvēlies TXT vai PDF failu</span>
      </label>

      <button id="readBtn" disabled>▶ Lasīt</button>

      <div id="status" class="status hidden"></div>

      <audio id="audioPlayer" controls class="hidden"></audio>

      <a id="downloadBtn" class="btn-download hidden" download="alise-lasijums.mp3">⬇ Lejupielādēt MP3</a>
    </section>

    <section class="card hidden" id="modeB">
      <p class="mic-hint">Saki <strong>"Alise"</strong>, tad uzdod jautājumu.<br>
        <span class="langs">Latviešu · English</span>
      </p>

      <button id="micBtn">⬤ Aktivizēt mikrofonu</button>

      <div id="micStatus" class="status hidden"></div>

      <div id="micTranscript" class="transcript hidden"></div>
    </section>

    <footer>
      <small>AL&amp;BL Readings · lingua.id.lv · Powered by ElevenLabs</small>
    </footer>
  </main>

  <script src="app.js"></script>
</body>
</html>
